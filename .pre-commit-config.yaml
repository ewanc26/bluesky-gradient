# Automatically format non-Rust files with Prettier on commit.
# The crate itself is Rust, but the repo contains JSON config and Markdown
# docs that benefit from consistent formatting.
repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        pass_filenames: true
